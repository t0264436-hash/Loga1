<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C.G Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        fundo: '#FFFFFF',
                        suave: '#F5F0E6',
                        destaque: '#E53935'
                    }
                }
            }
        }
    </script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #fff; margin: 0; padding: 0; }
        .logo { font-weight: 900; font-size: 1.8rem; color: #E53935; cursor: pointer; user-select: none; }
        .card-loja { transition: all 0.3s ease; }
        .card-loja:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:9999; align-items:center; justify-content:center; }
        .modal.ativo { display:flex; }
        .painel { display:none; position:fixed; inset:0; background:#fff; z-index:9998; overflow-y:auto; padding-bottom:2rem; }
        .painel.aberto { display:block; }
        .btn { padding:0.75rem; border-radius:6px; font-weight:600; border:none; cursor:pointer; transition:0.2s; }
        .btn-verm { background:#E53935; color:white; }
        .btn-verm:hover { background:#c62828; }
        .btn-cinz { background:#757575; color:white; }
        .btn-cinz:hover { background:#616161; }
        .btn-verde { background:#2e7d32; color:white; }
        .btn-verde:hover { background:#1b5e20; }
        .btn-azul { background:#1565c0; color:white; }
        .btn-azul:hover { background:#0d47a1; }
        .input { width:100%; padding:0.75rem; margin:0.5rem 0; border:1px solid #ddd; border-radius:6px; box-sizing:border-box; font-size:1rem; }
        .aviso { padding:0.75rem; border-radius:6px; margin:1rem 0; display:none; }
        .aviso.sucesso { background:#e8f5e9; color:#2e7d32; border:1px solid #c8e6c9; display:block; }
        .aviso.erro { background:#ffebee; color:#c62828; border:1px solid #ffcdd2; display:block; }
        .lista-itens { margin-top:1rem; max-height:250px; overflow-y:auto; }
        .item { display:flex; justify-content:space-between; align-items:center; padding:0.5rem; border-bottom:1px solid #eee; }
    </style>
</head>
<body>

<!-- Cabeçalho -->
<header class="bg-suave shadow-md sticky top-0 z-50">
    <div class="container mx-auto px-4 py-3 flex justify-between items-center">
        <div class="logo" id="btnAdmin">C.G</div>
        <div class="flex gap-2">
            <input type="text" id="busca" placeholder="Buscar loja..." class="px-3 py-2 rounded border w-64">
            <button onclick="filtrarLojas()" class="btn btn-verm" style="width:auto;">🔍</button>
        </div>
    </div>
</header>

<!-- Conteúdo Público -->
<main id="conteudoPublico" class="container mx-auto px-4 py-8">
    <h1 class="text-3xl font-bold text-center mb-2 text-destaque">C.G Marketplace</h1>
    <p class="text-center text-gray-600 mb-10">Escolha uma loja e peça direto pelo WhatsApp</p>
    <div id="listaLojas" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
</main>

<!-- Tela Senha -->
<div id="telaSenha" class="modal">
    <div class="bg-white p-6 rounded-xl w-80 shadow-2xl">
        <h3 class="text-xl font-bold mb-4 text-center text-destaque">🔐 Acesso Administrativo</h3>
        <input type="password" id="senhaAdmin" placeholder="Digite a senha" class="input" autocomplete="off">
        <div class="flex gap-2 mt-3">
            <button onclick="fecharSenha()" class="btn btn-cinz flex-1">Cancelar</button>
            <button onclick="verificarSenha()" class="btn btn-verm flex-1">Entrar</button>
        </div>
    </div>
</div>

<!-- PAINEL ADMIN COMPLETO -->
<div id="painelAdmin" class="painel">
    <div class="container mx-auto px-4 py-6 max-w-3xl">
        <div class="flex justify-between items-center mb-6">
            <div>
                <h2 class="text-2xl font-bold text-destaque">⚙️ Painel de Controle</h2>
                <p class="text-gray-600 text-sm">Gerenciamento completo de lojas e produtos</p>
            </div>
            <button onclick="sairAdmin()" class="btn btn-cinz" style="width:auto;">Sair</button>
        </div>

        <div id="avisoGeral" class="aviso"></div>

        <!-- ABA 1: LOJAS -->
        <div class="bg-suave p-5 rounded-lg mb-6">
            <h3 class="text-lg font-semibold mb-3">🏪 Cadastrar / Editar Loja</h3>
            <form id="formLoja">
                <input type="hidden" id="idLojaEditar">
                <input type="text" id="nomeLoja" placeholder="Nome da Loja" required class="input">
                <input type="text" id="wppLoja" placeholder="WhatsApp (apenas números com DDD)" required class="input">
                <input type="file" id="fotoLoja" accept="image/*" class="input">
                <div class="flex gap-2 mt-2">
                    <button type="submit" class="btn btn-verm flex-1">💾 Salvar Loja</button>
                    <button type="button" onclick="limparFormLoja()" class="btn btn-cinz" style="width:auto;">Limpar</button>
                </div>
            </form>

            <div class="lista-itens">
                <h4 class="font-semibold mb-2">Lojas Cadastradas:</h4>
                <div id="listaLojasAdmin"></div>
            </div>
        </div>

        <!-- ABA 2: PRODUTOS -->
        <div class="bg-suave p-5 rounded-lg">
            <h3 class="text-lg font-semibold mb-3">🍔 Cadastrar / Editar Produto</h3>
            <select id="selLojaProd" class="input" required>
                <option value="">Selecione a Loja</option>
            </select>
            <form id="formProduto">
                <input type="hidden" id="idProdEditar">
                <input type="text" id="nomeProd" placeholder="Nome do Produto" required class="input">
                <input type="number" step="0.01" min="0.01" id="precoProd" placeholder="Preço R$" required class="input">
                <textarea id="descProd" placeholder="Descrição (opcional)" rows="2" class="input"></textarea>
                <input type="file" id="fotoProd" accept="image/*" class="input">
                <div class="flex gap-2 mt-2">
                    <button type="submit" class="btn btn-verm flex-1">💾 Salvar Produto</button>
                    <button type="button" onclick="limparFormProd()" class="btn btn-cinz" style="width:auto;">Limpar</button>
                </div>
            </form>

            <div class="lista-itens">
                <h4 class="font-semibold mb-2">Produtos por Loja:</h4>
                <div id="listaProdAdmin"></div>
            </div>
        </div>
    </div>
</div>

<!-- INTEGRAÇÃO FIREBASE + IMGBB -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // DADOS DO SEU PROJETO
    const firebaseConfig = {
        apiKey: "AIzaSyAhI04lOGs4NGC0n9c2NSUqC-puBLVAG4A",
        authDomain: "market-place-33da8.firebaseapp.com",
        databaseURL: "https://market-place-33da8-default-rtdb.firebaseio.com",
        projectId: "market-place-33da8",
        storageBucket: "market-place-33da8.firebasestorage.app",
        messagingSenderId: "863627503284",
        appId: "1:863627503284:web:1ddbe57824fd3d568219e1"
    };
    const CHAVE_IMGBB = "8e6694726060a78a9ef5261bf1d67135";
    const SENHA_ADM = "3103";

    // INICIALIZAR
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let lojas = [];

    // --- FUNÇÕES GERAIS ---
    function mostrarAviso(texto, tipo='sucesso'){
        const av = document.getElementById('avisoGeral');
        av.className = `aviso ${tipo}`;
        av.textContent = texto;
        setTimeout(()=>av.className='aviso', 3500);
    }

    async function enviarFoto(arquivo){
        const form = new FormData();
        form.append('image', arquivo);
        const res = await fetch(`https://api.imgbb.com/1/upload?key=${CHAVE_IMGBB}`, {method:'POST', body:form});
        const dados = await res.json();
        return dados.data.url;
    }

    // --- ACESSO ADMIN ---
    document.getElementById('btnAdmin').onclick = ()=>document.getElementById('telaSenha').classList.add('ativo');
    window.fecharSenha = ()=>document.getElementById('telaSenha').classList.remove('ativo');
    window.sairAdmin = ()=>{
        document.getElementById('painelAdmin').classList.remove('aberto');
        document.getElementById('conteudoPublico').style.display='block';
        document.getElementById('senhaAdmin').value='';
    };
    window.verificarSenha = ()=>{
        if(document.getElementById('senhaAdmin').value === SENHA_ADM){
            fecharSenha();
            document.getElementById('conteudoPublico').style.display='none';
            document.getElementById('painelAdmin').classList.add('aberto');
        }else{
            mostrarAviso('Senha incorreta!', 'erro');
        }
    };

    // --- CARREGAR DADOS DO BANCO ---
    onValue(ref(db, 'lojas'), snap=>{
        lojas = snap.val() ? Object.entries(snap.val()).map(([id,dados])=>({id, ...dados})) : [];
        atualizarTudo();
    });

    function atualizarTudo(){
        carregarLojasSite();
        atualizarSelectLojas();
        carregarLojasAdmin();
    }

    function carregarLojasSite(filtrar=null){
        const lista = filtrar ? lojas.filter(l=>l.nome.toLowerCase().includes(filtrar.toLowerCase())) : lojas;
        document.getElementById('listaLojas').innerHTML = lista.length ? lista.map(l=>`
            <a href="loja.html?id=${l.id}" class="card-loja bg-suave rounded-xl overflow-hidden block">
                <img src="${l.foto}" class="w-full h-48 object-cover" loading="lazy">
                <div class="p-4">
                    <h3 class="text-xl font-bold">${l.nome}</h3>
                    <p class="text-gray-600">${l.produtos ? Object.keys(l.produtos).length : 0} produtos</p>
                    <div class="btn btn-verm text-center mt-3">Ver Loja</div>
                </div>
            </a>
        `).join('') : '<p class="col-span-full text-center text-gray-500">Nenhuma loja cadastrada.</p>';
    }
    window.filtrarLojas = ()=>carregarLojasSite(document.getElementById('busca').value);

    function atualizarSelectLojas(){
        document.getElementById('selLojaProd').innerHTML = `<option value="">Selecione a Loja</option>`
            + lojas.map(l=>`<option value="${l.id}">${l.nome}</option>`).join('');
    }

    function carregarLojasAdmin(){
        document.getElementById('listaLojasAdmin').innerHTML = lojas.map(l=>`
            <div class="item">
                <span>${l.nome}</span>
                <div class="flex gap-1">
                    <button onclick="editarLoja('${l.id}')" class="btn btn-azul" style="width:auto; padding:0.4rem 0.6rem;">✏️</button>
                    <button onclick="apagarLoja('${l.id}','${l.nome}')" class="btn btn-verm" style="width:auto; padding:0.4rem 0.6rem;">🗑️</button>
                </div>
            </div>
        `).join('');
    }

    // --- CRUD LOJAS ---
    document.getElementById('formLoja').onsubmit = async e=>{
        e.preventDefault();
        const idEditar = document.getElementById('idLojaEditar').value;
        const dados = {
            nome: document.getElementById('nomeLoja').value.trim(),
            wpp: document.getElementById('wppLoja').value.replace(/\D/g,''),
            produtos: {}
        };

        if(document.getElementById('fotoLoja').files[0]){
            dados.foto = await enviarFoto(document.getElementById('fotoLoja').files[0]);
        }else if(idEditar){
            dados.foto = lojas.find(l=>l.id===idEditar).foto;
            dados.produtos = lojas.find(l=>l.id===idEditar).produtos || {};
        }

        if(idEditar){
            await set(ref(db, `lojas/${idEditar}`), dados);
            mostrarAviso('Loja atualizada!');
        }else{
            const novaRef = push(ref(db, 'lojas'), dados);
            mostrarAviso('Loja cadastrada com sucesso!');
        }
        limparFormLoja();
    };

    window.editarLoja = id=>{
        const l = lojas.find(x=>x.id===id);
        document.getElementById('idLojaEditar').value = id;
        document.getElementById('nomeLoja').value = l.nome;
        document.getElementById('wppLoja').value = l.wpp;
        mostrarAviso('Editando loja: envie nova foto se quiser alterar', 'sucesso');
    };

    window.apagarLoja = async (id,nome)=>{
        if(confirm(`Tem certeza que apaga a loja "${nome}" e TODOS os seus produtos?`)){
            await remove(ref(db, `lojas/${id}`));
            mostrarAviso('Loja removida!');
        }
    };

    window.limparFormLoja = ()=>{
        document.getElementById('formLoja').reset();
        document.getElementById('idLojaEditar').value='';
    };

    // --- CRUD PRODUTOS ---
    document.getElementById('formProduto').onsubmit = async e=>{
        e.preventDefault();
        const idLoja = document.getElementById('selLojaProd').value;
        if(!idLoja) return mostrarAviso('Escolha uma loja primeiro!', 'erro');

        const idEditar = document.getElementById('idProdEditar').value;
        const dados = {
            nome: document.getElementById('nomeProd').value.trim(),
            preco: parseFloat(document.getElementById('precoProd').value),
            desc: document.getElementById('descProd').value.trim()
        };

        if(document.getElementById('fotoProd').files[0]){
            dados.foto = await enviarFoto(document.getElementById('fotoProd').files[0]);
        }else if(idEditar){
            const loja = lojas.find(l=>l.id===idLoja);
            dados.foto = loja.produtos[idEditar].foto;
        }

        const refProd = ref(db, `lojas/${idLoja}/produtos/${idEditar || push(ref(db)).key}`);
        await set(refProd, dados);
        mostrarAviso(idEditar ? 'Produto atualizado!' : 'Produto cadastrado!');
        limparFormProd();
    };

    document.getElementById('selLojaProd').onchange = ()=>{
        const id = this.value;
        if(!id) return document.getElementById('listaProdAdmin').innerHTML='';
        const loja = lojas.find(l=>l.id===id);
        const prods = loja.produtos ? Object.entries(loja.produtos) : [];
        document.getElementById('listaProdAdmin').innerHTML = prods.map(([pid,p])=>`
            <div class="item">
                <span>${p.nome} - R$ ${p.preco.toFixed(2)}</span>
                <div class="flex gap-1">
                    <button onclick="editarProd('${id}','${pid}')" class="btn btn-azul" style="width:auto; padding:0.4rem 0.6rem;">✏️</button>
                    <button onclick="apagarProd('${id}','${pid}','${p.nome}')" class="btn btn-verm" style="width:auto; padding:0.4rem 0.6rem;">🗑️</button>
                </div>
            </div>
        `).join('');
    };

    window.editarProd = (idLoja,idProd)=>{
        const p = lojas.find(l=>l.id===idLoja).produtos[idProd];
        document.getElementById('selLojaProd').value = idLoja;
        document.getElementById('idProdEditar').value = idProd;
        document.getElementById('nomeProd').value = p.nome;
        document.getElementById('precoProd').value = p.preco;
        document.getElementById('descProd').value = p.desc||'';
        mostrarAviso('Editando produto: envie nova foto se quiser', 'sucesso');
    };

    window.apagarProd = async (idLoja,idProd,nome)=>{
        if(confirm(`Apagar produto "${nome}"?`)){
            await remove(ref(db, `lojas/${idLoja}/produtos/${idProd}`));
            mostrarAviso('Produto removido!');
            document.getElementById('selLojaProd').dispatchEvent(new Event('change'));
        }
    };

    window.limparFormProd = ()=>{
        document.getElementById('formProduto').reset();
        document.getElementById('idProdEditar').value='';
    };
</script>
</body>
</html>
