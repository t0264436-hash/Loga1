<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C.G | Cardápio Geral</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        preto: '#0A0A0A',
                        dourado: '#D4AF37',
                        douradoClaro: '#F0D78C',
                        douradoEscuro: '#996515',
                        fundoCard: '#141414',
                        textoSecundario: '#B3B3B3'
                    },
                    fontFamily: {
                        principal: ['"Montserrat"', 'sans-serif'],
                        destaque: ['"Playfair Display"', 'serif']
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .text-shadow { text-shadow: 0 0 8px rgba(212, 175, 55, 0.4); }
            .borda-dourada { border: 1px solid rgba(212, 175, 55, 0.3); }
            .sombra-dourada { box-shadow: 0 0 12px rgba(212, 175, 55, 0.15); }
            .gradiente-dourado { background: linear-gradient(135deg, #D4AF37, #F0D78C); }
        }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-preto text-white font-principal min-h-screen">
    <!-- Tela de Carregamento -->
    <div id="telaCarregamento" class="fixed inset-0 bg-preto z-50 flex items-center justify-center">
        <h1 class="text-5xl font-destaque text-dourado text-shadow">C.G</h1>
    </div>

    <!-- Barra de Navegação -->
    <header class="sticky top-0 z-40 bg-preto/95 backdrop-blur-sm borda-dourada border-b px-4 py-3 flex justify-between items-center">
        <a href="#" onclick="mostrarPagina('inicio')" class="text-3xl font-destaque text-dourado text-shadow">C.G</a>
        <div class="flex gap-4">
            <button onclick="mostrarPagina('carrinho')" class="relative text-xl">
                <i class="fa fa-shopping-cart text-dourado"></i>
                <span id="badgeCarrinho" class="absolute -top-2 -right-2 bg-dourado text-preto text-xs w-5 h-5 flex items-center justify-center rounded-full hidden">0</span>
            </button>
            <button onclick="mostrarPagina('login')" id="btnAcesso" class="text-douradoClaro font-medium">Acesso</button>
        </div>
    </header>

    <!-- Conteúdo Principal -->
    <main class="pb-20">
        <!-- Página Início -->
        <section id="paginaInicio" class="pagina px-4 py-6">
            <h2 class="text-2xl font-bold mb-6 text-douradoClaro">Cardápio Geral</h2>
            <div id="listaLojas" class="grid gap-4">
                <!-- Lojas carregam aqui -->
            </div>
        </section>

        <!-- Página Loja -->
        <section id="paginaLoja" class="pagina hidden px-4 py-6">
            <button onclick="voltarInicio()" class="text-dourado mb-4"><i class="fa fa-arrow-left mr-2"></i>Voltar</button>
            <div class="flex items-center gap-4 mb-6">
                <img id="fotoLoja" class="w-20 h-20 rounded-full object-cover borda-dourada">
                <div>
                    <h2 id="nomeLoja" class="text-2xl font-bold text-douradoClaro"></h2>
                    <p id="qtdeProdutosLoja" class="text-sm text-textoSecundario"></p>
                </div>
            </div>
            <div id="categoriasLoja" class="mb-6 flex flex-wrap gap-2">
                <!-- Categorias carregam aqui -->
            </div>
            <div id="listaProdutos" class="grid gap-4">
                <!-- Produtos carregam aqui -->
            </div>
        </section>

        <!-- Página Carrinho -->
        <section id="paginaCarrinho" class="pagina hidden px-4 py-6">
            <h2 class="text-2xl font-bold mb-6 text-douradoClaro">Meu Pedido</h2>
            <div id="itensCarrinho" class="mb-8">
                <!-- Itens carregam aqui -->
            </div>
            <div class="border-t border-dourado/30 pt-4">
                <div class="flex justify-between text-xl font-semibold mb-4">
                    <span>Total:</span>
                    <span id="valorTotal" class="text-douradoClaro">R$ 0,00</span>
                </div>
                <div class="mb-4">
                    <label class="block mb-2 text-douradoClaro">Forma de Pagamento</label>
                    <select id="formaPagamento" class="w-full p-3 rounded-lg bg-fundoCard borda-dourada text-white">
                        <option value="pix">Pix</option>
                        <option value="cartao">Cartão</option>
                        <option value="dinheiro">Dinheiro</option>
                    </select>
                </div>
                <div id="campoTroco" class="mb-4 hidden">
                    <label class="block mb-2 text-douradoClaro">Vai pagar com quanto?</label>
                    <input type="number" id="valorPagamento" step="0.01" min="0" class="w-full p-3 rounded-lg bg-fundoCard borda-dourada text-white" placeholder="Digite o valor">
                    <p id="resultadoTroco" class="mt-2 text-sm text-textoSecundario"></p>
                </div>
                <button id="btnFinalizar" class="w-full py-3 rounded-lg gradiente-dourado text-preto font-semibold mt-4" disabled>
                    Finalizar no WhatsApp
                </button>
            </div>
        </section>

        <!-- Página Login -->
        <section id="paginaLogin" class="pagina hidden px-4 py-6">
            <h2 class="text-2xl font-bold mb-6 text-douradoClaro">Acesso Lojista</h2>
            <div class="space-y-4">
                <input type="text" id="usuarioLogin" placeholder="Seu e-mail ou nome de usuário" class="w-full p-3 rounded-lg bg-fundoCard borda-dourada text-white">
                <input type="password" id="senhaLogin" placeholder="Sua senha" class="w-full p-3 rounded-lg bg-fundoCard borda-dourada text-white">
                <button onclick="fazerLogin()" class="w-full py-3 rounded-lg gradiente-dourado text-preto font-semibold">Entrar</button>
                <p class="text-center text-textoSecundario">Não tem conta? <a href="#" onclick="mostrarPagina('cadastro')" class="text-dourado">Cadastre-se</a></p>
                <p class="text-center text-textoSecundario text-sm mt-4"><a href="#" onclick="loginAdmin()" class="text-dourado/70">Acesso Administrador</a></p>
            </div>
        </section>

        <!-- Página Cadastro -->
        <section id="paginaCadastro" class="pagina hidden px-4 py-6">
            <button onclick="mostrarPagina('login')" class="text-dourado mb-4"><i class="fa fa-arrow-left mr-2"></i>Voltar</button>
            <h2 class="text-2xl font-bold mb-6 text-douradoClaro">Criar Conta Lojista</h2>
            <div class="space-y-4">
                <input type="text" id="nomeCadastro" placeholder="Seu nome completo" class="w-full p-3 rounded-lg bg-fundoCard borda-dourada text-white">
                <input type="email" id="emailCadastro" placeholder="Seu e-mail" class="w-full p-3 rounded-lg bg-fundoCard borda-dourada text-white">
                <input type="password" id="senhaCadastro" placeholder="Crie uma senha" class="w-full p-3 rounded-lg bg-fundoCard borda-dourada text-white">
                <button onclick="fazerCadastro()" class="w-full py-3 rounded-lg gradiente-dourado text-preto font-semibold">Criar Conta</button>
            </div>
        </section>

        <!-- Página Painel Lojista -->
        <section id="paginaPainel" class="pagina hidden px-4 py-6">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-douradoClaro">Meu Painel</h2>
                <button onclick="fazerLogout()" class="text-douradoClaro text-sm">Sair</button>
            </div>
            <button onclick="abrirModalLoja()" class="w-full py-3 rounded-lg mb-6 gradiente-dourado text-preto font-semibold">+ Nova Loja</button>
            <div id="minhasLojas" class="space-y-4">
                <!-- Suas lojas carregam aqui -->
            </div>
        </section>

        <!-- Página Editar Loja -->
        <section id="paginaEditarLoja" class="pagina hidden px-4 py-6">
            <button onclick="mostrarPagina('painel')" class="text-dourado mb-4"><i class="fa fa-arrow-left mr-2"></i>Voltar</button>
            <h2 id="tituloEditarLoja" class="text-2xl font-bold mb-6 text-douradoClaro">Dados da Loja</h2>
            <div class="space-y-4 mb-8">
                <input type="text" id="editarNomeLoja" placeholder="Nome da loja" class="w-full p-3 rounded-lg bg-fundoCard borda-dourada text-white">
                <input type="text" id="editarFotoLoja" placeholder="Link da foto de perfil" class="w-full p-3 rounded-lg bg-fundoCard borda-dourada text-white">
                <input type="text" id="editarWhatsAppLoja" placeholder="Número do WhatsApp com DDD" class="w-full p-3 rounded-lg bg-fundoCard borda-dourada text-white">
                <button onclick="salvarLoja()" class="w-full py-3 rounded-lg gradiente-dourado text-preto font-semibold">Salvar Alterações</button>
            </div>
            <div class="border-t border-dourado/30 pt-6">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-xl font-semibold text-douradoClaro">Produtos</h3>
                    <button onclick="abrirModalProduto()" class="text-dourado"><i class="fa fa-plus-circle mr-1"></i> Adicionar</button>
                </div>
                <div id="listaMeusProdutos" class="space-y-3">
                    <!-- Produtos da loja carregam aqui -->
                </div>
            </div>
        </section>
    </main>

    <!-- Modais -->
    <div id="modalProduto" class="fixed inset-0 bg-black/80 z-50 hidden flex items-end md:items-center justify-center">
        <div class="bg-preto w-full max-w-md p-6 rounded-t-xl md:rounded-xl borda-dourada">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-bold text-douradoClaro">Adicionar Produto</h3>
                <button onclick="fecharModal('modalProduto')" class="text-douradoClaro text-xl"><i class="fa fa-times"></i></button>
            </div>
            <div class="space-y-4">
                <input type="text" id="nomeProduto" placeholder="Nome do produto" class="w-full p-3 rounded-lg bg-fundoCard borda-dourada text-white">
                <input type="text" id="fotoProduto" placeholder="Link da foto" class="w-full p-3 rounded-lg bg-fundoCard borda-dourada text-white">
                <textarea id="descricaoProduto" placeholder="Descrição" rows="2" class="w-full p-3 rounded-lg bg-fundoCard borda-dourada text-white"></textarea>
                <input type="number" id="valorProduto" step="0.01" placeholder="Valor R$" class="w-full p-3 rounded-lg bg-fundoCard borda-dourada text-white">
                <select id="categoriaProduto" class="w-full p-3 rounded-lg bg-fundoCard borda-dourada text-white">
                    <option value="Lanches">Lanches</option>
                    <option value="Doces">Doces</option>
                    <option value="Bebidas">Bebidas</option>
                    <option value="Pratos">Pratos Feitos</option>
                    <option value="Outros">Outros</option>
                </select>
                <button onclick="salvarProduto()" class="w-full py-3 rounded-lg gradiente-dourado text-preto font-semibold">Salvar</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== BANCO DE DADOS LOCAL ====================
        const db = {
            get: (chave) => JSON.parse(localStorage.getItem(chave)) || [],
            set: (chave, valor) => localStorage.setItem(chave, JSON.stringify(valor))
        };

        // Dados iniciais
        if(!db.get('contas').length) {
            db.set('contas', [
                {id: 'admin', nome: 'Administrador', email: 'admin@cg.com.br', senha: 'cg12345', admin: true}
            ]);
        }

        // ==================== VARIÁVEIS GLOBAIS ====================
        let paginaAtual = 'inicio';
        let usuarioLogado = null;
        let lojaAtual = null;
        let carrinho = [];
        let editandoProduto = null;

        // ==================== NAVEGAÇÃO ====================
        function mostrarPagina(nome) {
            document.querySelectorAll('.pagina').forEach(p => p.classList.add('hidden'));
            document.getElementById(`pagina${nome.charAt(0).toUpperCase() + nome.slice(1)}`).classList.remove('hidden');
            paginaAtual = nome;
            atualizarInterface();
        }

        function voltarInicio() {
            lojaAtual = null;
            mostrarPagina('inicio');
        }

        // ==================== FUNÇÕES INICIAIS ====================
        window.onload = () => {
            setTimeout(() => {
                document.getElementById('telaCarregamento').classList.add('hidden');
                verificarLogin();
                carregarLojas();
                atualizarCarrinho();
            }, 800);

            // Cálculo automático de troco
            document.getElementById('formaPagamento').addEventListener('change', e => {
                const campo = document.getElementById('campoTroco');
                campo.classList.toggle('hidden', e.target.value !== 'dinheiro');
                calcularTroco();
            });

            document.getElementById('valorPagamento').addEventListener('input', calcularTroco);
        };

        // ==================== LOJAS E PRODUTOS ====================
        function carregarLojas() {
            const lojas = db.get('lojas');
            const container = document.getElementById('listaLojas');
            container.innerHTML = '';

            if(!lojas.length) {
                container.innerHTML = `<p class="text-textoSecundario text-center py-10">Nenhuma loja cadastrada ainda. Volte depois!</p>`;
                return;
            }

            lojas.forEach(loja => {
                const qtde = db.get('produtos').filter(p => p.lojaId === loja.id).length;
                const card = document.createElement('div');
                card.className = 'bg-fundoCard rounded-xl p-4 borda-dourada sombra-dourada flex items-center gap-4 cursor-pointer';
                card.onclick = () => abrirLoja(loja.id);
                card.innerHTML = `
                    <img src="${loja.foto || 'https://via.placeholder.com/80/D4AF37/FFFFFF?text=CG'}" class="w-16 h-16 rounded-full object-cover borda-dourada">
                    <div>
                        <h3 class="font-semibold text-douradoClaro">${loja.nome}</h3>
                        <p class="text-sm text-textoSecundario">${qtde} produtos</p>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function abrirLoja(idLoja) {
            const lojas = db.get('lojas');
            lojaAtual = lojas.find(l => l.id === idLoja);
            carrinho = [];
            atualizarCarrinho();
            
            document.getElementById('fotoLoja').src = lojaAtual.foto || 'https://via.placeholder.com/80/D4AF37/FFFFFF?text=CG';
            document.getElementById('nomeLoja').textContent = lojaAtual.nome;
            
            const produtos = db.get('produtos').filter(p => p.lojaId === idLoja);
            document.getElementById('qtdeProdutosLoja').textContent = `${produtos.length} produtos`;

            // Carregar categorias
            const categorias = [...new Set(produtos.map(p => p.categoria))];
            const catContainer = document.getElementById('categoriasLoja');
            catContainer.innerHTML = `<button class="px-3 py-1 rounded-full bg-dourado text-preto text-sm">Todos</button>`;
            categorias.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = 'px-3 py-1 rounded-full bg-fundoCard borda-dourada text-sm';
                btn.textContent = cat;
                btn.onclick = () => filtrarCategoria(cat, produtos);
                catContainer.appendChild(btn);
            });

            renderizarProdutos(produtos);
            mostrarPagina('loja');
        }

        function renderizarProdutos(lista) {
            const container = document.getElementById('listaProdutos');
            container.innerHTML = '';

            if(!lista.length) {
                container.innerHTML = `<p class="text-textoSecundario text-center py-10">Nenhum produto encontrado.</p>`;
                return;
            }

            lista.forEach(prod => {
                const card = document.createElement('div');
                card.className = 'bg-fundoCard rounded-xl p-4 borda-dourada sombra-dourada';
                card.innerHTML = `
                    <div class="flex gap-4">
                        <img src="${prod.foto || 'https://via.placeholder.com/80/D4AF37/FFFFFF?text=Produto'}" class="w-20 h-20 rounded-lg object-cover">
                        <div class="flex-1">
                            <h3 class="font-semibold text-douradoClaro">${prod.nome}</h3>
                            <p class="text-sm text-textoSecundario mb-2">${prod.descricao || ''}</p>
                            <p class="font-bold text-dourado">R$ ${prod.valor.toFixed(2).replace('.', ',')}</p>
                        </div>
                    </div>
                    <button onclick="adicionarAoCarrinho(${JSON.stringify(prod).replace(/"/g, '&quot;')})" class="w-full mt-3 py-2 rounded-lg bg-douradoEscuro text-white text-sm font-medium">Adicionar</button>
                `;
                container.appendChild(card);
            });
        }

        function filtrarCategoria(cat, todos) {
            const filtrado = todos.filter(p => p.categoria === cat);
            renderizarProdutos(filtrado);
        }

        // ==================== CARRINHO ====================
        function adicionarAoCarrinho(produto) {
            const existe = carrinho.find(i => i.id === produto.id);
            if(existe) existe.quantidade++;
            else carrinho.push({...produto, quantidade: 1});
            atualizarCarrinho();
        }

        function alterarQuantidade(id, delta) {
            const item = carrinho.find(i => i.id === id);
            if(item) {
                item.quantidade += delta;
                if(item.quantidade <= 0) carrinho = carrinho.filter(i => i.id !== id);
                atualizarCarrinho();
            }
        }

        function atualizarCarrinho() {
            const badge = document.getElementById('badgeCarrinho');
            const totalItens = carrinho.reduce((soma, i) => soma + i.quantidade, 0);
            const valorTotal = carrinho.reduce((soma, i) => soma + (i.valor * i.quantidade), 0);

            badge.classList.toggle('hidden', totalItens === 0);
            badge.textContent = totalItens;
            document.getElementById('valorTotal').textContent = `R$ ${valorTotal.toFixed(2).replace('.', ',')}`;
            document.getElementById('btnFinalizar').disabled = carrinho.length === 0;

            const container = document.getElementById('itensCarrinho');
            if(!carrinho.length) {
                container.innerHTML = `<p class="text-textoSecundario text-center py-10">Seu carrinho está vazio</p>`;
                return;
            }

            container.innerHTML = '';
            carrinho.forEach(item => {
                const el = document.createElement('div');
                el.className = 'flex justify-between items-center py-3 border-b border-dourado/20';
                el.innerHTML = `
                    <div class="flex-1">
                        <p class="font-medium">${item.nome}</p>
                        <p class="text-sm text-textoSecundario">R$ ${item.valor.toFixed(2).replace('.', ',')} cada</p>
                    </div>
                    <div class="flex items-center gap-3">
                        <button onclick="alterarQuantidade('${item.id}', -1)" class="text-dourado text-xl">-</button>
                        <span class="font-medium w-6 text-center">${item.quantidade}</span>
                        <button onclick="alterarQuantidade('${item.id}', 1)" class="text-dourado text-xl">+</button>
                    </div>
                `;
                container.appendChild(el);
            });

            calcularTroco();
        }

        function calcularTroco() {
            const total = carrinho.reduce((s, i) => s + (i.valor * i.quantidade), 0);
            const valorPago = parseFloat(document.getElementById('valorPagamento').value) || 0;
            const resultado = document.getElementById('resultadoTroco');
            
            if(valorPago >= total && document.getElementById('formaPagamento').value === 'dinheiro') {
                const troco = valorPago - total;
                resultado.textContent = `Troco: R$ ${troco.toFixed(2).replace('.', ',')}`;
            } else {
                resultado.textContent = '';
            }
        }

        // Finalizar pedido no WhatsApp
        document.getElementById('btnFinalizar').onclick = () => {
            if(!lojaAtual) return alert('Volte e escolha uma loja primeiro');
            
            const total = carrinho.reduce((s, i) => s + (i.valor * i.quantidade), 0);
            const forma = document.getElementById('formaPagamento').value;
            const valorPago = parseFloat(document.getElementById('valorPagamento').value) || 0;
            
            let mensagem = `*PEDIDO - ${lojaAtual.nome}*\n\n`;
            carrinho.forEach(item => {
                mensagem += `${item.quantidade}x ${item.nome} - R$ ${(item.valor * item.quantidade).toFixed(2).replace('.', ',')}\n`;
            });
            mensagem += `\n*Total: R$ ${total.toFixed(2).replace('.', ',')}*\n`;
            mensagem += `*Pagamento: ${forma === 'pix' ? 'Pix' : forma === 'cartao' ? 'Cartão' : 'Dinheiro'}*`;
            
            if(forma === 'dinheiro' && valorPago >= total) {
                mensagem += `\n*Vai pagar com: R$ ${valorPago.toFixed(2).replace('.', ',')}*\n*Troco: R$ ${(valorPago - total).toFixed(2).replace('.', ',')}*`;
            }

            const url = `https://wa.me/55${lojaAtual.whatsapp.replace(/\D/g, '')}?text=${encodeURIComponent(mensagem)}`;
            window.open(url, '_blank');
            carrinho = [];
            atualizarCarrinho();
        };

        // ==================== AUTENTICAÇÃO ====================
        function fazerCadastro() {
            const nome = document.getElementById('nomeCadastro').value.trim();
            const email = document.getElementById('emailCadastro').value.trim();
            const senha = document.getElementById('senhaCadastro').value;

            if(!nome || !email || !senha) return alert('Preencha todos os campos');
            const contas = db.get('contas');
            if(contas.find(c => c.email === email)) return alert('Esse e-mail já está cadastrado');

            contas.push({id: Date.now().toString(), nome, email, senha, admin: false});
            db.set('contas', contas);
            alert('Conta criada com sucesso! Faça login');
            mostrarPagina('login');
        }

        function fazerLogin() {
            const email = document.getElementById('usuarioLogin').value.trim();
            const senha = document.getElementById('senhaLogin').value;
            const contas = db.get('contas');
            const usuario = contas.find(c => c.email === email && c.senha === senha);

            if(!usuario) return alert('E-mail ou senha incorretos');
            usuarioLogado = usuario;
            localStorage.setItem('logado', JSON.stringify(usuario));
            atualizarInterface();
            mostrarPagina('painel');
        }

        function loginAdmin() {
            document.getElementById('usuarioLogin').value = 'admin@cg.com.br';
            document.getElementById('senhaLogin').value = 'cg12345';
        }

        function verificarLogin() {
            const salvo = JSON.parse(localStorage.getItem('logado'));
            if(salvo) usuarioLogado = salvo;
            atualizarInterface();
        }

        function fazerLogout() {
            usuarioLogado = null;
            localStorage.removeItem('logado');
            atualizarInterface();
            mostrarPagina('inicio');
        }

        function atualizarInterface() {
            const btn = document.getElementById('btnAcesso');
            if(usuarioLogado) {
                btn.textContent = 'Painel';
                btn.onclick = () => mostrarPagina('painel');
                carregarPainel();
            } else {
                btn.textContent = 'Acesso';
                btn.onclick = () => mostrarPagina('login');
            }
        }

        // ==================== PAINEL LOJISTA ====================
        function carregarPainel() {
            if(!usuarioLogado) return;
            const lojas = db.get('lojas').filter(l => l.donoId === usuarioLogado.id || usuarioLogado.admin);
            const container = document.getElementById('minhasLojas');
            container.innerHTML = '';

            if(!lojas.length) {
                container.innerHTML = `<p class="text-textoSecundario">Você ainda não tem nenhuma loja</p>`;
                return;
            }

            lojas.forEach(loja => {
                const card = document.createElement('div');
                card.className = 'bg-fundoCard p-4 rounded-xl borda-dourada flex justify-between items-center';
                card.innerHTML = `
                    <div class="flex items-center gap-3">
                        <img src="${loja.foto || 'https://via.placeholder.com/60/D4AF37/FFFFFF?text=CG'}" class="w-12 h-12 rounded-full object-cover">
                        <div>
                            <p class="font-medium text-douradoClaro">${loja.nome}</p>
                            <p class="text-xs text-textoSecundario">${window.location.origin}/#loja=${loja.id}</p>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="editarLoja('${loja.id}')" class="text-dourado"><i class="fa fa-pencil"></i></button>
                        <button onclick="apagarLoja('${loja.id}')" class="text-red-400"><i class="fa fa-trash"></i></button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function abrirModalLoja() {
            document.getElementById('editarNomeLoja').value = '';
            document.getElementById('editarFotoLoja').value = '';
            document.getElementById('editarWhatsAppLoja').value = '';
            lojaAtual = null;
            document.getElementById('tituloEditarLoja').textContent = 'Nova Loja';
            mostrarPagina('editarLoja');
            document.getElementById('listaMeusProdutos').innerHTML = '';
        }

        function editarLoja(id) {
            const lojas = db.get('lojas');
            lojaAtual = lojas.find(l => l.id === id);
            document.getElementById('editarNomeLoja').value = lojaAtual.nome;
            document.getElementById('editarFotoLoja').value = lojaAtual.foto || '';
            document.getElementById('editarWhatsAppLoja').value = lojaAtual.whatsapp;
            document.getElementById('tituloEditarLoja').textContent = `Editar: ${lojaAtual.nome}`;
            mostrarPagina('editarLoja');
            carregarMeusProdutos();
        }

        function salvarLoja() {
            const nome = document.getElementById('editarNomeLoja').value.trim();
            const foto = document.getElementById('editarFotoLoja').value.trim();
            const whatsapp = document.getElementById('editarWhatsAppLoja').value.trim().replace(/\D/g, '');

            if(!nome || !whatsapp || whatsapp.length < 10) return alert('Preencha nome e WhatsApp corretamente');

            const lojas = db.get('lojas');
            if(lojaAtual) {
                const idx = lojas.findIndex(l => l.id === lojaAtual.id);
                lojas[idx] = {...lojaAtual, nome, foto, whatsapp};
            } else {
                lojas.push({id: Date.now().toString(), nome, foto, whatsapp, donoId: usuarioLogado.id});
            }

            db.set('lojas', lojas);
            alert('Loja salva!');
            carregarLojas();
            mostrarPagina('painel');
        }

        function apagarLoja(id) {
            if(!confirm('Tem certeza? Essa ação apaga todos os produtos da loja')) return;
            let lojas = db.get('lojas').filter(l => l.id !== id);
            let produtos = db.get('produtos').filter(p => p.lojaId !== id);
            db.set('lojas', lojas);
            db.set('produtos', produtos);
            carregarLojas();
            carregarPainel();
        }

        function carregarMeusProdutos() {
            if(!lojaAtual) return;
            const produtos = db.get('produtos').filter(p => p.lojaId === lojaAtual.id);
            const container = document.getElementById('listaMeusProdutos');
            container.innerHTML = '';

            produtos.forEach(prod => {
                const el = document.createElement('div');
                el.className = 'flex justify-between items-center py-2 border-b border-dourado/20';
                el.innerHTML = `
                    <div>
                        <p class="font-medium">${prod.nome}</p>
                        <p class="text-xs text-textoSecundario">R$ ${prod.valor.toFixed(2).replace('.', ',')} • ${prod.categoria}</p>
                    </div>
                    <div class="flex gap-3">
                        <button onclick="editarProduto('${prod.id}')" class="text-dourado text-sm"><i class="fa fa-pencil"></i></button>
                        <button onclick="apagarProduto('${prod.id}')" class="text-red-400 text-sm"><i class="fa fa-trash"></i></button>
                    </div>
                `;
                container.appendChild(el);
            });
        }

        function abrirModalProduto() {
            editandoProduto = null;
            document.getElementById('nomeProduto').value = '';
            document.getElementById('fotoProduto').value = '';
            document.getElementById('descricaoProduto').value = '';
            document.getElementById('valorProduto').value = '';
            document.getElementById('categoriaProduto').value = 'Lanches';
            document.getElementById('modalProduto').classList.remove('hidden');
        }

        function fecharModal(id) {
            document.getElementById(id).classList.add('hidden');
        }

        function editarProduto(id) {
            const prod = db.get('produtos').find(p => p.id === id);
            editandoProduto = prod;
            document.getElementById('nomeProduto').value = prod.nome;
            document.getElementById('fotoProduto').value = prod.foto || '';
            document.getElementById('descricaoProduto').value = prod.descricao || '';
            document.getElementById('valorProduto').value = prod.valor;
            document.getElementById('categoriaProduto').value = prod.categoria;
            document.getElementById('modalProduto').classList.remove('hidden');
        }

        function salvarProduto() {
            if(!lojaAtual) return alert('Escolha uma loja primeiro');
            const nome = document.getElementById('nomeProduto').value.trim();
            const foto = document.getElementById('fotoProduto').value.trim();
            const descricao = document.getElementById('descricaoProduto').value.trim();
            const valor = parseFloat(document.getElementById('valorProduto').value);
            const categoria = document.getElementById('categoriaProduto').value;

            if(!nome || isNaN(valor) || valor <= 0) return alert('Preencha nome e valor corretamente');

            const produtos = db.get('produtos');
            if(editandoProduto) {
                const idx = produtos.findIndex(p => p.id === editandoProduto.id);
                produtos[idx] = {...editandoProduto, nome, foto, descricao, valor, categoria};
            } else {
                produtos.push({id: Date.now().toString(), lojaId: lojaAtual.id, nome, foto, descricao, valor, categoria});
            }

            db.set('produtos', produtos);
            fecharModal('modalProduto');
            carregarMeusProdutos();
            carregarLojas();
        }

        function apagarProduto(id) {
            if(!confirm('Apagar esse produto?')) return;
            const produtos = db.get('produtos').filter(p => p.id !== id);
            db.set('produtos', produtos);
            carregarMeusProdutos();
            carregarLojas();
        }
    </script>
</body>
</html>
